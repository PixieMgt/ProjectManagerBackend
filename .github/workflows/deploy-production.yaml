name: Deploy - Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Disable IPv6
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/projectmanager-backend:prod-latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/projectmanager-backend:prod-latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
          
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Install cloudflared
        run: |
          sudo mkdir -p /usr/local/bin
          sudo curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared

      - name: Start SSH over Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          cat << 'EOF' > ~/.ssh/config
          Host ssh.pixiemgt.com
            ProxyCommand cloudflared access tcp --hostname %h --id ${{ secrets.CF_CLIENT_ID }} --secret ${{ secrets.CF_CLIENT_SECRET }}
            User projectmanager
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
          EOF
      
      - name: Port forward Kubernetes API
        run: |
          ssh -fN \
            -o StrictHostKeyChecking=no \
            -L 6443:127.0.0.1:6443 \
            projectmanager@ssh.pixiemgt.com

      - name: Update Kubernetes secrets
        run: |
          kubectl delete secret backend-secrets -n production --ignore-not-found
          kubectl create secret generic backend-secrets \
            -n production \
            --from-literal=DB_USER="${{ secrets.PROD_DB_USER }}"
            --from-literal=DB_PASSWORD="${{ secrets.PROD_DB_PASSWORD }}" \
            --from-literal=JWT_SECRET="${{ secrets.PROD_JWT_SECRET }}" \
            --from-literal=SESSION_SECRET="${{ secrets.PROD_SESSION_SECRET }}"

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/deployment.yaml -n production
          kubectl apply -f k8s/service.yaml -n production

      - name: Restart deployment
        run: |
          kubectl rollout restart deployment/backend -n production
          kubectl rollout status deployment/backend -n production
