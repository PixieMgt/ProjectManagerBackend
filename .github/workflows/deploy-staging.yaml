name: Deploy - Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Disable IPv6
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/projectmanager-backend:staging-latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/projectmanager-backend:staging-latest

      - name: Install cloudflared
        run: |
          sudo wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared

      - name: Configure SSH over Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          cat << 'EOF' > ~/.ssh/config
Host ssh.pixiemgt.com
  ProxyCommand cloudflared access tcp --hostname %h --id ${{ secrets.CF_CLIENT_ID }} --secret ${{ secrets.CF_CLIENT_SECRET }}
  User projectmanager
  IdentityFile ~/.ssh/id_ed25519
  StrictHostKeyChecking no
EOF

      - name: Copy manifests to VM
        run: |
          scp -r k8s ssh.pixiemgt.com:/tmp/k8s

      - name: Apply manifests on VM
        run: |
          ssh ssh.pixiemgt.com "kubectl apply -f /tmp/k8s/deployment.yaml -n staging && kubectl apply -f /tmp/k8s/service.yaml -n staging"

      - name: Restart deployment
        run: |
          ssh ssh.pixiemgt.com "kubectl rollout restart deployment/backend -n staging && kubectl rollout status deployment/backend -n staging"
